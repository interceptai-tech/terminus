global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'terminus'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['terminus:8000']
        labels:
          service: 'terminus'
