# Tells Grafana to load any dashboard JSON found in this directory on startup.
apiVersion: 1

providers:
  - name: Terminus
    orgId: 1
    folder: Terminus
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
