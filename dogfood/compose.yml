services:
  dogfood-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dogfood
      POSTGRES_PASSWORD: dogfood-local-only
      POSTGRES_DB: dogfood
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dogfood -d dogfood"]
      interval: 1s
      timeout: 3s
      retries: 30
