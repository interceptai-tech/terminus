# ---------------------------------------------------------------------------
# F11: a data-modifying op hidden in a CTE bypasses operation-based rules
# (classified by the top-level op only) -> deny nested_write. Not self-
# correctable: a smuggled write has no benign rewrite.
# ---------------------------------------------------------------------------
- id: dml_cte_delete_under_select
  sql: "WITH d AS (DELETE FROM public.users WHERE id = 1 RETURNING id) SELECT 1"
  dialect: postgres
  category: dangerous_dml
  expected_decision: deny
  expected_reason_code: nested_write
  self_correctable: false
- id: dml_cte_insert_unrestricted_under_select
  sql: "WITH i AS (INSERT INTO public.orders (id) VALUES (1) RETURNING id) SELECT 1"
  dialect: postgres
  category: dangerous_dml
  expected_decision: deny
  expected_reason_code: nested_write
  self_correctable: false
- id: dml_cte_update_under_select
  sql: "WITH u AS (UPDATE public.users SET name = 'x' WHERE id = 1 RETURNING id) SELECT 1"
  dialect: postgres
  category: dangerous_dml
  expected_decision: deny
  expected_reason_code: nested_write
  self_correctable: false
- id: dml_cte_write_smuggled_in_top_level_insert
  sql: "WITH d AS (DELETE FROM public.orders WHERE id = 1 RETURNING id) INSERT INTO public.orders (id) VALUES (1)"
  dialect: postgres
  category: dangerous_dml
  expected_decision: deny
  expected_reason_code: nested_write
  self_correctable: false
