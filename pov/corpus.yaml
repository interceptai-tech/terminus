# ---------------------------------------------------------------------------
# injection (30 entries) — SQL injection patterns that are denied
# Injections to non-whitelisted tables via UNION, subquery -> schema_whitelist
# Multi-statement injections -> multi_statement
# Pure tautology/comment injections on whitelisted tables are ALLOWED by the
# engine, so those cannot appear in this category.
# ---------------------------------------------------------------------------

- id: inj_union_shadow
  sql: "SELECT id FROM public.users WHERE id = 1 UNION ALL SELECT pass FROM shadow.users"
  dialect: postgres
  category: injection
  expected_decision: deny
  expected_reason_code: schema_whitelist
  self_correctable: false

- id: inj_union_admin
  sql: "SELECT id, name FROM public.users UNION SELECT username, password FROM admin.users"
  dialect: postgres
  category: injection
  expected_decision: deny
  expected_reason_code: schema_whitelist
  self_correctable: false

# F10b: a QUOTED table identifier is case-sensitive in Postgres, so "public"."USERS"
# is a distinct table from the whitelisted public.users and must not be folded onto it.
- id: schema_whitelist_quoted_case_variant_table
  sql: 'SELECT id FROM "public"."USERS" WHERE id = 1'
  dialect: postgres
  category: injection
  expected_decision: deny
  expected_reason_code: schema_whitelist
  self_correctable: false

- id: inj_union_info_schema
  sql: "SELECT id FROM public.users WHERE id = 1 UNION SELECT table_name FROM information_schema.tables"
  dialect: postgres
  category: injection
  expected_decision: deny
  expected_reason_code: schema_whitelist
  self_correctable: false

- id: inj_union_pg_class
  sql: "SELECT id FROM public.orders UNION SELECT relname FROM pg_catalog.pg_class"
