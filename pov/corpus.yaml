# Terminus PoV validation corpus.
#
# ~250 tagged SQL entries for the PoV harness (Task 2).
# Each entry is tagged against the shipped example policy + whitelist:
#   examples/policy.yaml + examples/schema_whitelist.yaml
#
# Tagging rules (spot-checked against the live engine):
#   - benign_read / benign_write -> allow (valid reads/writes on approved tables/columns)
#   - all other categories -> deny
#   - self_correctable: true ONLY for wildcard column_violation (SELECT *: Terminus
#     returns suggested_sql) and for dangerous_dml UPDATE-without-WHERE on an
#     approved table (adding a WHERE makes it pass); col_disallowed_* are false
#   - expected_reason_code is set only when confident of the exact gate
#
# Whitelisted tables: public.users (columns: id, name, email), public.orders (no col
# restriction), analytics.* (no col restriction).
# Destructive ops (DROP/ALTER/CREATE/DELETE) -> policy rule deny.
# TRUNCATE parses as TRUNCATETABLE (no matching policy rule) -> default deny.
# UPDATE without WHERE falls through to default deny (no reason_code set).

