# ---------------------------------------------------------------------------
# injection / whitelist-evasion (15 entries) — the F10c class. Snowflake folds
# unquoted identifiers to UPPERCASE (the canonical whitelist form), but quoted
# identifiers preserve their literal case. A quoted-lowercase or mixed-case
# dotted path (e.g. "public"."users", "Public"."Orders") therefore does NOT
# match the canonical PUBLIC.USERS / PUBLIC.ORDERS whitelist entries and must
# be denied -> schema_whitelist, the same evasion class as F10b/F10c on
# Postgres, mirrored for Snowflake's fold direction. Tagged `injection`
# (adversarial evasion of a security control), not `hallucination`.
# ---------------------------------------------------------------------------

- id: sf_evade_quoted_lowercase_users
  sql: 'SELECT id FROM "public"."users" WHERE id = 1'
  dialect: snowflake
  category: injection
  expected_decision: deny
  expected_reason_code: schema_whitelist

