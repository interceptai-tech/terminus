# ---------------------------------------------------------------------------
# Snowflake-specific pins (4 entries) -- MERGE and COPY INTO are Snowflake/DW
# idioms with no Postgres analog in pov/corpus.yaml. Both deny under the
# shipped config: MERGE falls through every policy rule to the priority-rule
# default deny (reason_code=default, not rule-correctable -- the corrector only
# handles UPDATE-without-WHERE, so self_correctable is false); COPY INTO an
# external stage/S3 URI is an exfiltration path that never resolves to a
# whitelisted table, so it is denied at the schema whitelist gate before any
# policy rule runs. Decisions and reason codes below are observed, not assumed
# (see the probe command in the sprint task notes).
# ---------------------------------------------------------------------------

- id: sf_merge_orders_update_from_events
  sql: "MERGE INTO public.orders o USING analytics.events ev ON o.id = ev.order_id WHEN MATCHED THEN UPDATE SET status = ev.status"
  dialect: snowflake
  category: dangerous_dml
  expected_decision: deny
  self_correctable: false

- id: sf_merge_orders_delete_from_subquery
  sql: "MERGE INTO public.orders tgt USING (SELECT id, status FROM analytics.events) src ON tgt.id = src.id WHEN MATCHED THEN DELETE"
  dialect: snowflake
  category: dangerous_dml
  expected_decision: deny
  self_correctable: false

- id: sf_copy_into_stage_users_exfil
  sql: "COPY INTO @my_stage FROM public.users"
  dialect: snowflake
  category: injection
  expected_decision: deny
  expected_reason_code: schema_whitelist
  self_correctable: false

- id: sf_copy_into_s3_orders_exfil
