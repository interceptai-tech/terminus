# Terminus PoV validation corpus — Snowflake dialect.
#
# Snowflake-dialect counterpart to pov/corpus.yaml. Every entry here is tagged
# against the shipped example policy + whitelist, graded under
# TERMINUS_SQL_DIALECT=snowflake:
#   examples/policy.yaml + examples/schema_whitelist.yaml
#
# Tagging rules (same contract as pov/corpus.yaml):
#   - benign_read / benign_write -> allow (valid reads/writes on approved tables/columns)
#   - all other categories -> deny (authored in later sprint tasks, not this file)
#   - expected_reason_code is set only when confident of the exact gate
#
# Whitelisted tables: public.users (columns: id, name, email), public.orders (no col
# restriction), analytics.* (no col restriction). The harness sends agent_id
# analytics_agent_42, which matches the allow_analytics_reads rule (SELECT on
# public.users/public.orders/analytics.*), allow_controlled_updates (UPDATE with
# WHERE on public.users/public.orders), and allow_controlled_inserts (INSERT on
# those tables; column allowlist still applies to public.users).
#
# Snowflake identifier folding: unquoted identifiers fold to UPPERCASE and still
# match the whitelist (matching is case-insensitive on the normalized form), so
# lowercase/uppercase unquoted SQL is equally fine here. A quoted-UPPERCASE
# identifier (e.g. "PUBLIC"."USERS") is the canonical quoted form and also
# allows. Quoted-lowercase/mixed-case identifiers (e.g. "public"."users",
# "Public"."Orders") do NOT match the canonical uppercase object -- this is
# the F10c whitelist-evasion class, tagged `injection` with
# expected_reason_code: schema_whitelist in the injection section below (not
# used in the benign sections above). On public.users, the benign sections
# above reference ONLY columns id/name/email; SELECT * and disallowed named
# columns on public.users are deny cases in the column_violation section
# below (SELECT * on analytics.* remains fine -- no column restriction).
#
# This is a faithful Snowflake re-expression, not a Postgres tag-flip: most
# entries carry a genuinely Snowflake-distinguishing idiom (ILIKE, QUALIFY,
# ::string/::number/::number(p,s) casts, IFF, TRY_CAST, NULLIFZERO, DATEADD,
# DATEDIFF, TO_DATE, LISTAGG, CURRENT_TIMESTAMP()/CURRENT_DATE(), FETCH FIRST N
# ROWS ONLY, quoted-uppercase canonical identifiers). A handful of entries are
# left as plain ANSI SQL on purpose, both to keep `sf_read_users_unquoted_upper_fold`
# as the deliberate fold-check exemplar and to preserve some realistic
# generic-traffic coverage.
#
# Final composition: 248 entries across all nine categories -- benign allow
# (benign_read, benign_write) plus F10c whitelist-evasion, column, injection,
# destructive, dangerous_dml, multi-statement, invalid, and hallucination
# denies -- graded under TERMINUS_SQL_DIALECT=snowflake against examples/*.yaml.

