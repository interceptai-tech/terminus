# ---------------------------------------------------------------------------
# column_violation (29 entries) — public.users is column-restricted to
# [id, name, email]. Three sub-families:
#   - wildcard SELECT * (10 entries): self_correctable true, Terminus returns
#     a suggested_sql restricted to the allowed columns; verified to actually
#     round-trip to allow.
#   - quoted-lowercase column reference (2 entries): the column-level analog
#     of the F10c table evasion above -- Snowflake folds unquoted `email`/
#     `name` to canonical EMAIL/NAME, but a quoted-lowercase "email"/"name"
#     preserves its literal case and does not match the canonical allowlist,
#     so it denies just like a genuinely disallowed column. Not correctable
#     (no way to know the caller meant the canonical-case column).
#   - named disallowed columns + disallowed-column INSERTs (17 entries):
#     never self-correctable.
# ---------------------------------------------------------------------------

- id: sf_col_star_users_selfcorrect
  sql: "SELECT * FROM public.users WHERE id::number = 1"
  dialect: snowflake
  category: column_violation
  expected_decision: deny
  expected_reason_code: column_whitelist
