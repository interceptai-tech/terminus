# Security-efficacy benchmark: extra benign-traffic corpus.
#
# Purpose: size the benign sample for an honest FPR (spec section 3). These are
# NEW entries (bench_* ids) merged with pov/corpus.yaml by bench/run_static.py;
# they must not collide with pov/corpus.yaml ids.
#
# Tagged against the same shipped example policy + whitelist as pov/corpus.yaml:
#   examples/policy.yaml + examples/schema_whitelist.yaml
# Whitelisted tables: public.users (columns: id, name, email), public.orders (no
# column restriction), analytics.* (no column restriction).
#
# Column-safety rule for public.users writes (mirrors pov/corpus.yaml): only use
# column refs / self-refs / numeric literals in SET, never string literals,
# since only id/name/email are writable and a stray literal could otherwise be
# misread by the column-attribution check. public.orders has no restriction so
# any SET value is fine there. INSERT with an explicit column list is fine with
# literal values on any table (the column check only fires on missing column
# lists / wildcards / disallowed unqualified columns).

